name: Fusion UI Build & Deploy

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fusion-ui-build-deploy-${{ github.ref }}
  cancel-in-progress: true

# 镜像源:阿里云 ACR 个人版(深圳,境内端点);改仓名只动 IMAGE_NAME 一行
env:
  REGISTRY: crpi-77w10wlykpqilmmb.cn-shenzhen.personal.cr.aliyuncs.com
  IMAGE_NAME: crpi-77w10wlykpqilmmb.cn-shenzhen.personal.cr.aliyuncs.com/seanfield/fusion-ui

jobs:
  build:
    name: Build on Windows runner
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    outputs:
      started_at: ${{ steps.pipeline_start.outputs.started_at }}
      runner_name: ${{ steps.pipeline_start.outputs.runner_name }}
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NEXT_PUBLIC_AUTH_SERVICE_BASE_URL: ${{ vars.NEXT_PUBLIC_AUTH_SERVICE_BASE_URL }}
      NEXT_PUBLIC_AUTH_SERVICE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_AUTH_SERVICE_CLIENT_ID }}
      NEXT_PUBLIC_AUTH_CALLBACK_URL: ${{ vars.NEXT_PUBLIC_AUTH_CALLBACK_URL }}
    defaults:
      run:
        shell: cmd

    steps:
      - name: Record pipeline start
        id: pipeline_start
        run: |
          for /f %%i in ('powershell -NoProfile -ExecutionPolicy Bypass -Command "[DateTimeOffset]::UtcNow.ToUnixTimeSeconds()"') do echo started_at=%%i>>%GITHUB_OUTPUT%
          echo runner_name=${{ runner.name }}>>%GITHUB_OUTPUT%

      - name: Configure Docker credential directory
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $dockerConfig = Join-Path $env:RUNNER_TEMP ".docker-$env:GITHUB_RUN_ID-$env:GITHUB_JOB"
          New-Item -ItemType Directory -Force -Path $dockerConfig | Out-Null
          "DOCKER_CONFIG=$dockerConfig" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Push CI/CD active metric
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $ProgressPreference = "SilentlyContinue"
          $environment = if ($env:GITHUB_REF_NAME -eq "master") { "dev" } else { "preview" }
          $branchKey = $env:GITHUB_REF_NAME -replace '[^A-Za-z0-9_.-]', '_'
          $now = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          $metrics = @"
          # HELP cicd_pipeline_active Whether a CI/CD pipeline is currently active (1=true, 0=false).
          # TYPE cicd_pipeline_active gauge
          cicd_pipeline_active{project="fusion-ui",branch="$env:GITHUB_REF_NAME",environment="$environment",runner="${{ runner.name }}"} 1
          # HELP cicd_pipeline_active_timestamp_seconds Timestamp of the latest CI/CD active-state update.
          # TYPE cicd_pipeline_active_timestamp_seconds gauge
          cicd_pipeline_active_timestamp_seconds{project="fusion-ui",branch="$env:GITHUB_REF_NAME",environment="$environment",runner="${{ runner.name }}"} $now
          "@
          $body = (($metrics -replace "`r`n", "`n").Trim() + "`n")
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          try {
            Invoke-WebRequest -UseBasicParsing -Method Post -Uri "http://192.168.1.10:9092/metrics/job/cicd_active/project_key/fusion-ui/branch_key/$branchKey/environment_key/$environment" -ContentType "text/plain; version=0.0.4" -Body $bytes -TimeoutSec 5 | Out-Null
            Write-Host "CI/CD active metric pushed"
          } catch {
            Write-Host "CI/CD active metric push failed, ignored: $($_.Exception.Message)"
          }

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Verify Docker access
        run: |
          docker version
          docker ps

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --cache "%RUNNER_TEMP%\npm-cache"

      - name: Configure preview public env
        run: |
          if not "%GITHUB_REF_NAME%"=="master" (
            echo NEXT_PUBLIC_AUTH_CALLBACK_URL=http://fusion-ui-preview.dev.seanfield.org/auth/callback>>%GITHUB_ENV%
          )

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build --build-arg NEXT_PUBLIC_AUTH_SERVICE_BASE_URL="%NEXT_PUBLIC_AUTH_SERVICE_BASE_URL%" --build-arg NEXT_PUBLIC_AUTH_SERVICE_CLIENT_ID="%NEXT_PUBLIC_AUTH_SERVICE_CLIENT_ID%" --build-arg NEXT_PUBLIC_AUTH_CALLBACK_URL="%NEXT_PUBLIC_AUTH_CALLBACK_URL%" --build-arg API_BACKEND_URL=http://fusion-api:8000 -t "%IMAGE_NAME%:%GITHUB_SHA%" .

      - name: Push Docker image
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $image = "${env:IMAGE_NAME}:${env:GITHUB_SHA}"
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            docker push $image
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($attempt -eq 3) {
              exit $LASTEXITCODE
            }

            $delay = 10 * $attempt
            Write-Host "docker push 失败，第 $attempt 次，${delay}s 后重试..."
            Start-Sleep -Seconds $delay
          }

      - name: Cleanup local Docker artifacts
        if: always()
        run: |
          docker image rm "%IMAGE_NAME%:%GITHUB_SHA%" 2>NUL
          docker builder prune --filter "until=72h" -f

  deploy-preview:
    name: Deploy preview on dev server
    if: github.ref != 'refs/heads/master'
    needs: build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10

    steps:
      - name: Record deploy start time
        run: echo "DEPLOY_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Login to ACR
        run: echo "${ACR_PASSWORD}" | docker login "${REGISTRY}" -u "${ACR_USERNAME}" --password-stdin
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

      - name: Pull and restart preview
        run: |
          cd ~/project/fusion
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cat > docker-compose.fusion-ui-preview.yml <<'EOF'
          services:
            fusion-ui-preview:
              image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
              container_name: fusion-ui-preview
              restart: always
              ports:
                - "3005:3000"
              environment:
                - NODE_ENV=production
              deploy:
                resources:
                  limits:
                    memory: 256m
              networks:
                - postgres_default

          networks:
            postgres_default:
              external: true
          EOF
          docker rm -f fusion-ui-design-system-v2 2>/dev/null || true
          docker compose -f docker-compose.fusion-ui-preview.yml up -d

      - name: Cleanup old preview images
        if: always()
        run: |
          current="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' ${{ env.IMAGE_NAME }} \
            | awk -v current="$current" '$1 != current {print $2}' \
            | sort -u \
            | xargs -r docker rmi || true

      - name: Push CI/CD metrics
        if: always()
        run: |
          if ! timeout 15s bash ~/scripts/push-cicd-metrics.sh \
            fusion-ui \
            "${{ github.ref_name }}" \
            preview \
            "${{ job.status }}" \
            "${{ needs.build.outputs.started_at }}" \
            "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            "${{ github.sha }}" \
            "${{ needs.build.outputs.runner_name }}" \
            fusion-ui-preview \
            "${{ env.DEPLOY_START }}"; then
            echo "CI/CD metrics push failed, ignored"
          fi

  deploy-dev:
    name: Deploy master on dev server
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10

    steps:
      - name: Record deploy start time
        run: echo "DEPLOY_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Login to ACR
        run: echo "${ACR_PASSWORD}" | docker login "${REGISTRY}" -u "${ACR_USERNAME}" --password-stdin
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

      - name: Pull and restart fusion-ui
        run: |
          cd ~/project/fusion
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cat > docker-compose.fusion-ui-ghcr.yml <<'EOF'
          services:
            fusion-ui:
              image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
              container_name: fusion-ui
              restart: always
              ports:
                - "3004:3000"
              environment:
                - NODE_ENV=production
              deploy:
                resources:
                  limits:
                    memory: 256m
              networks:
                - postgres_default

          networks:
            postgres_default:
              external: true
          EOF
          # 兜底：清掉旧 compose project 持有的同名容器，避免首次切换镜像源时容器名冲突
          docker rm -f fusion-ui 2>/dev/null || true
          docker compose -f docker-compose.fusion-ui-ghcr.yml up -d

      - name: Cleanup old images
        if: always()
        run: |
          current="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' ${{ env.IMAGE_NAME }} \
            | awk -v current="$current" '$1 != current {print $2}' \
            | sort -u \
            | xargs -r docker rmi || true

      - name: Push CI/CD metrics
        if: always()
        run: |
          if ! timeout 15s bash ~/scripts/push-cicd-metrics.sh \
            fusion-ui \
            "${{ github.ref_name }}" \
            dev \
            "${{ job.status }}" \
            "${{ needs.build.outputs.started_at }}" \
            "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            "${{ github.sha }}" \
            "${{ needs.build.outputs.runner_name }}" \
            fusion-ui \
            "${{ env.DEPLOY_START }}"; then
            echo "CI/CD metrics push failed, ignored"
          fi

      - name: 通知飞书(部署结果)
        if: always()
        continue-on-error: true
        env:
          FEISHU_INFRA_WEBHOOK: ${{ secrets.FEISHU_INFRA_WEBHOOK }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # 提交信息可含任意字符,只经 env 传入 python(os.environ→json),绝不进 shell,杜绝注入。
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$FEISHU_INFRA_WEBHOOK" ]; then
            echo "FEISHU_INFRA_WEBHOOK 未配置,跳过飞书通知"
            exit 0
          fi
          export SHORT_SHA="${GITHUB_SHA:0:7}"
          export DEPLOY_TS="$(date -u '+%Y-%m-%d %H:%M UTC')"
          python3 - <<'PY'
          import json, os, urllib.request
          ok = os.environ.get("JOB_STATUS") == "success"
          repo = os.environ.get("REPO", "")
          ref = os.environ.get("REF_NAME", "")
          sha = os.environ.get("SHORT_SHA", "")
          status = os.environ.get("JOB_STATUS", "")
          ts = os.environ.get("DEPLOY_TS", "")
          run_url = os.environ.get("RUN_URL", "")
          raw = os.environ.get("COMMIT_MSG", "") or ""
          lines = [ln for ln in raw.splitlines() if ln.strip()]
          msg = "\n".join(lines[:3]) if lines else "(无提交信息)"
          if len(msg) > 240:
              msg = msg[:240] + "…"
          card = {
              "msg_type": "interactive",
              "card": {
                  "config": {"wide_screen_mode": True},
                  "header": {
                      "template": "green" if ok else "red",
                      "title": {"tag": "plain_text",
                                "content": ("✅ 部署成功 · " if ok else "❌ 部署失败 · ") + repo},
                  },
                  "elements": [
                      {"tag": "div", "text": {"tag": "lark_md", "content": f"**提交信息**\n{msg}"}},
                      {"tag": "hr"},
                      {"tag": "div", "fields": [
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**分支**\n{ref}"}},
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**提交**\n`{sha}`"}},
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**结果**\n{status}"}},
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**时间**\n{ts}"}},
                      ]},
                      {"tag": "action", "actions": [
                          {"tag": "button", "type": "primary",
                           "text": {"tag": "plain_text", "content": "查看运行日志"},
                           "url": run_url}]},
                      {"tag": "note", "elements": [
                          {"tag": "plain_text", "content": "🤖 UptimeKuma · CI/CD 部署告警"}]},
                  ],
              },
          }
          data = json.dumps(card).encode()
          req = urllib.request.Request(
              os.environ["FEISHU_INFRA_WEBHOOK"], data=data,
              headers={"Content-Type": "application/json"})
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f"飞书响应 http={r.status} body={r.read().decode()}")
          except Exception as e:
              print(f"飞书通知失败(忽略): {e!r}")
          PY
