name: Deploy to Dev Server
on:
  push:
    branches: ["master"]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Sync deploy checkout
        run: cd ~/project/fusion/fusion-ui && git fetch origin && git reset --hard origin/master && git clean -fd
      - name: Build and deploy
        run: cd ~/project/fusion && docker compose up -d --build fusion-ui
      - name: Cleanup
        run: docker image prune -f
