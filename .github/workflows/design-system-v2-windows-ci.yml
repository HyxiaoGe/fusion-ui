name: Fusion UI Windows CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: fusion-ui-windows-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on Windows runner
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      IMAGE_NAME: ghcr.io/hyxiaoge/fusion-ui
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_AUTH_SERVICE_BASE_URL: ${{ vars.NEXT_PUBLIC_AUTH_SERVICE_BASE_URL }}
      NEXT_PUBLIC_AUTH_SERVICE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_AUTH_SERVICE_CLIENT_ID }}
      NEXT_PUBLIC_AUTH_CALLBACK_URL: ${{ vars.NEXT_PUBLIC_AUTH_CALLBACK_URL }}
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Verify Docker access
        run: |
          docker version
          docker ps

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --cache "%RUNNER_TEMP%\npm-cache"

      - name: Build
        run: npm run build

      - name: Test non-blocking while Vitest baseline is being cleaned up
        continue-on-error: true
        run: npm test

      - name: Login to GHCR
        run: echo %GITHUB_TOKEN% | docker login ghcr.io -u %GITHUB_ACTOR% --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build --build-arg NEXT_PUBLIC_API_BASE_URL="%NEXT_PUBLIC_API_BASE_URL%" --build-arg NEXT_PUBLIC_AUTH_SERVICE_BASE_URL="%NEXT_PUBLIC_AUTH_SERVICE_BASE_URL%" --build-arg NEXT_PUBLIC_AUTH_SERVICE_CLIENT_ID="%NEXT_PUBLIC_AUTH_SERVICE_CLIENT_ID%" --build-arg NEXT_PUBLIC_AUTH_CALLBACK_URL="%NEXT_PUBLIC_AUTH_CALLBACK_URL%" -t "%IMAGE_NAME%:%GITHUB_SHA%" .

      - name: Push Docker image
        run: |
          docker push "%IMAGE_NAME%:%GITHUB_SHA%"

  deploy-preview:
    name: Deploy preview on dev server
    if: github.ref == 'refs/heads/feat/design-system-v2'
    needs: build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10

    steps:
      - name: Login to GHCR
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and restart preview
        run: |
          cd ~/project/fusion
          docker pull ghcr.io/hyxiaoge/fusion-ui:${{ github.sha }}
          cat > docker-compose.design-system-v2.yml <<'EOF'
          services:
            fusion-ui-design-system-v2:
              image: ghcr.io/hyxiaoge/fusion-ui:${{ github.sha }}
              container_name: fusion-ui-design-system-v2
              restart: always
              ports:
                - "3005:3000"
              environment:
                - NODE_ENV=production
              deploy:
                resources:
                  limits:
                    memory: 256m
              networks:
                - postgres_default

          networks:
            postgres_default:
              external: true
          EOF
          docker compose -f docker-compose.design-system-v2.yml up -d

  deploy-dev:
    name: Deploy master on dev server
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10

    steps:
      - name: Record start time
        run: echo "BUILD_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Login to GHCR
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and restart fusion-ui
        run: |
          cd ~/project/fusion
          docker pull ghcr.io/hyxiaoge/fusion-ui:${{ github.sha }}
          cat > docker-compose.fusion-ui-ghcr.yml <<'EOF'
          services:
            fusion-ui:
              image: ghcr.io/hyxiaoge/fusion-ui:${{ github.sha }}
              container_name: fusion-ui
              restart: always
              ports:
                - "3004:3000"
              environment:
                - NODE_ENV=production
              deploy:
                resources:
                  limits:
                    memory: 256m
              networks:
                - postgres_default

          networks:
            postgres_default:
              external: true
          EOF
          docker compose -f docker-compose.fusion-ui-ghcr.yml up -d

      - name: Cleanup old images
        if: always()
        run: docker image prune -f

      - name: Push deploy metrics
        if: always()
        run: bash ~/scripts/push-deploy-metrics.sh fusion-ui master ${{ job.status }} ${{ env.BUILD_START }}
