name: Fusion UI Windows CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: fusion-ui-windows-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on Windows runner
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    outputs:
      started_at: ${{ steps.pipeline_start.outputs.started_at }}
      runner_name: ${{ steps.pipeline_start.outputs.runner_name }}
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      IMAGE_NAME: ghcr.io/hyxiaoge/fusion-ui
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_AUTH_SERVICE_BASE_URL: ${{ vars.NEXT_PUBLIC_AUTH_SERVICE_BASE_URL }}
      NEXT_PUBLIC_AUTH_SERVICE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_AUTH_SERVICE_CLIENT_ID }}
      NEXT_PUBLIC_AUTH_CALLBACK_URL: ${{ vars.NEXT_PUBLIC_AUTH_CALLBACK_URL }}
    defaults:
      run:
        shell: cmd

    steps:
      - name: Record pipeline start
        id: pipeline_start
        run: |
          for /f %%i in ('powershell -NoProfile -ExecutionPolicy Bypass -Command "[DateTimeOffset]::UtcNow.ToUnixTimeSeconds()"') do echo started_at=%%i>>%GITHUB_OUTPUT%
          echo runner_name=${{ runner.name }}>>%GITHUB_OUTPUT%

      - name: Push CI/CD active metric
        continue-on-error: true
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $environment = if ($env:GITHUB_REF_NAME -eq "master") { "dev" } else { "preview" }
          $branchKey = $env:GITHUB_REF_NAME -replace '[^A-Za-z0-9_.-]', '_'
          $now = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          $metrics = @"
          # HELP cicd_pipeline_active Whether a CI/CD pipeline is currently active (1=true, 0=false).
          # TYPE cicd_pipeline_active gauge
          cicd_pipeline_active{project="fusion-ui",branch="$env:GITHUB_REF_NAME",environment="$environment",runner="${{ runner.name }}"} 1
          # HELP cicd_pipeline_active_timestamp_seconds Timestamp of the latest CI/CD active-state update.
          # TYPE cicd_pipeline_active_timestamp_seconds gauge
          cicd_pipeline_active_timestamp_seconds{project="fusion-ui",branch="$env:GITHUB_REF_NAME",environment="$environment",runner="${{ runner.name }}"} $now
          "@
          Invoke-WebRequest -UseBasicParsing -Method Post -Uri "http://192.168.1.10:9092/metrics/job/cicd_active/project_key/fusion-ui/branch_key/$branchKey/environment_key/$environment" -Body $metrics

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Verify Docker access
        run: |
          docker version
          docker ps

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --cache "%RUNNER_TEMP%\npm-cache"

      - name: Configure preview public env
        run: |
          if not "%GITHUB_REF_NAME%"=="master" (
            echo NEXT_PUBLIC_AUTH_CALLBACK_URL=http://fusion-ui-preview.dev.seanfield.org/auth/callback>>%GITHUB_ENV%
          )

      - name: Build
        run: npm run build

      - name: Test non-blocking while Vitest baseline is being cleaned up
        continue-on-error: true
        run: npm test

      - name: Login to GHCR
        run: echo %GITHUB_TOKEN% | docker login ghcr.io -u %GITHUB_ACTOR% --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build --build-arg NEXT_PUBLIC_API_BASE_URL="%NEXT_PUBLIC_API_BASE_URL%" --build-arg NEXT_PUBLIC_AUTH_SERVICE_BASE_URL="%NEXT_PUBLIC_AUTH_SERVICE_BASE_URL%" --build-arg NEXT_PUBLIC_AUTH_SERVICE_CLIENT_ID="%NEXT_PUBLIC_AUTH_SERVICE_CLIENT_ID%" --build-arg NEXT_PUBLIC_AUTH_CALLBACK_URL="%NEXT_PUBLIC_AUTH_CALLBACK_URL%" -t "%IMAGE_NAME%:%GITHUB_SHA%" .

      - name: Push Docker image
        run: |
          docker push "%IMAGE_NAME%:%GITHUB_SHA%"

      - name: Cleanup local Docker artifacts
        if: always()
        run: |
          docker image rm "%IMAGE_NAME%:%GITHUB_SHA%" 2>NUL
          docker builder prune --filter "until=72h" -f

  deploy-preview:
    name: Deploy preview on dev server
    if: github.ref != 'refs/heads/master'
    needs: build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10

    steps:
      - name: Record deploy start time
        run: echo "DEPLOY_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Login to GHCR
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and restart preview
        run: |
          cd ~/project/fusion
          docker pull ghcr.io/hyxiaoge/fusion-ui:${{ github.sha }}
          cat > docker-compose.fusion-ui-preview.yml <<'EOF'
          services:
            fusion-ui-preview:
              image: ghcr.io/hyxiaoge/fusion-ui:${{ github.sha }}
              container_name: fusion-ui-preview
              restart: always
              ports:
                - "3005:3000"
              environment:
                - NODE_ENV=production
              deploy:
                resources:
                  limits:
                    memory: 256m
              networks:
                - postgres_default

          networks:
            postgres_default:
              external: true
          EOF
          docker rm -f fusion-ui-design-system-v2 2>/dev/null || true
          docker compose -f docker-compose.fusion-ui-preview.yml up -d

      - name: Cleanup old preview images
        if: always()
        run: |
          current="ghcr.io/hyxiaoge/fusion-ui:${{ github.sha }}"
          docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' ghcr.io/hyxiaoge/fusion-ui \
            | awk -v current="$current" '$1 != current {print $2}' \
            | sort -u \
            | xargs -r docker rmi || true

      - name: Push CI/CD metrics
        if: always()
        run: |
          bash ~/scripts/push-cicd-metrics.sh \
            fusion-ui \
            "${{ github.ref_name }}" \
            preview \
            "${{ job.status }}" \
            "${{ needs.build.outputs.started_at }}" \
            "ghcr.io/hyxiaoge/fusion-ui:${{ github.sha }}" \
            "${{ github.sha }}" \
            "${{ needs.build.outputs.runner_name }}" \
            fusion-ui-preview \
            "${{ env.DEPLOY_START }}"

  deploy-dev:
    name: Deploy master on dev server
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10

    steps:
      - name: Record deploy start time
        run: echo "DEPLOY_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Login to GHCR
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and restart fusion-ui
        run: |
          cd ~/project/fusion
          docker pull ghcr.io/hyxiaoge/fusion-ui:${{ github.sha }}
          cat > docker-compose.fusion-ui-ghcr.yml <<'EOF'
          services:
            fusion-ui:
              image: ghcr.io/hyxiaoge/fusion-ui:${{ github.sha }}
              container_name: fusion-ui
              restart: always
              ports:
                - "3004:3000"
              environment:
                - NODE_ENV=production
              deploy:
                resources:
                  limits:
                    memory: 256m
              networks:
                - postgres_default

          networks:
            postgres_default:
              external: true
          EOF
          docker compose -f docker-compose.fusion-ui-ghcr.yml up -d

      - name: Cleanup old images
        if: always()
        run: |
          current="ghcr.io/hyxiaoge/fusion-ui:${{ github.sha }}"
          docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' ghcr.io/hyxiaoge/fusion-ui \
            | awk -v current="$current" '$1 != current {print $2}' \
            | sort -u \
            | xargs -r docker rmi || true

      - name: Push CI/CD metrics
        if: always()
        run: |
          bash ~/scripts/push-cicd-metrics.sh \
            fusion-ui \
            "${{ github.ref_name }}" \
            dev \
            "${{ job.status }}" \
            "${{ needs.build.outputs.started_at }}" \
            "ghcr.io/hyxiaoge/fusion-ui:${{ github.sha }}" \
            "${{ github.sha }}" \
            "${{ needs.build.outputs.runner_name }}" \
            fusion-ui \
            "${{ env.DEPLOY_START }}"
