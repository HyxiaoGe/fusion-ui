name: Design System v2 Windows CI

on:
  push:
    branches: ["feat/design-system-v2"]
  workflow_dispatch:

concurrency:
  group: design-system-v2-windows-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on Windows runner
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Verify Docker access
        continue-on-error: true
        run: |
          docker version
          docker ps

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --cache "%RUNNER_TEMP%\npm-cache"

      - name: Build
        run: npm run build

      - name: Test non-blocking while Vitest baseline is being cleaned up
        continue-on-error: true
        run: npm test
